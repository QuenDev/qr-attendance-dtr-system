<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Attendance Monitoring</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="logo-placeholder">
      <img src="../assets/icons/logo-tsv.svg" alt="Logo" />
    </div>
    <h1>Admin Portal</h1>
    <p class="subtitle">Attendance Monitoring System</p>
    
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>
    
    <button id="loginBtn">Login</button>
    
    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255, 193, 7, 0.2);">
      <p style="color: #999; font-size: 12px; text-align: center; margin-bottom: 12px;">Or</p>
      <button id="employeeScannerBtn" style="background: rgba(255, 193, 7, 0.1); color: #ffd54a; border: 1px solid rgba(255, 193, 7, 0.3); display: flex; align-items: center; justify-content: center; gap: 8px;">
        <img src="../assets/icons/qr-code.svg" alt="QR Code" style="width: 20px; height: 20px;" />
        Scan QR Code
      </button>
    </div>
  </div>

  <!-- Modal for alerts -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-icon" id="modalIcon">ℹ️</span>
        <h2 id="modalTitle">Message</h2>
      </div>
      <p id="modalMessage">Please wait...</p>
      <button id="modalButton" class="modal-button">OK</button>
    </div>
  </div>

<script src="../dist/renderer/renderer.js"></script>

</body>
</html>
